name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Read version
        id: ver
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build binaries
        working-directory: ragtag
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          LDFLAGS="-X github.com/emirate/rag-tui/model.AppVersion=${VERSION}"
          mkdir -p ../bin
          GOOS=linux   GOARCH=amd64 go build -buildvcs=false -ldflags="$LDFLAGS" -o ../bin/ragtag-linux-amd64  .
          GOOS=linux   GOARCH=arm64 go build -buildvcs=false -ldflags="$LDFLAGS" -o ../bin/ragtag-linux-arm64  .
          GOOS=darwin  GOARCH=arm64 go build -buildvcs=false -ldflags="$LDFLAGS" -o ../bin/ragtag-mac-arm64    .
          GOOS=darwin  GOARCH=amd64 go build -buildvcs=false -ldflags="$LDFLAGS" -o ../bin/ragtag-mac-intel    .

      - name: Generate version JSON
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          COMMIT=$(git rev-parse --short HEAD)
          # Get the first line of the last commit message as changelog
          CHANGELOG=$(git log -1 --format='%s' | head -c 100)
          printf '{"version":"%s","commit":"%s","changelog":"%s"}\n' \
            "$VERSION" "$COMMIT" "$CHANGELOG" > bin/latest_version.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest bin/* \
            --title "Latest (${{ steps.ver.outputs.VERSION }})" \
            --notes "Built from $(git rev-parse --short HEAD) — ${{ steps.ver.outputs.VERSION }}" \
            --latest

      - name: Deploy to mirror
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          scp -i /tmp/deploy_key \
            -P 6767 \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            bin/ragtag-linux-amd64 \
            bin/ragtag-linux-arm64 \
            bin/ragtag-mac-arm64 \
            bin/ragtag-mac-intel \
            bin/latest_version.json \
            alkaline@upload.peeing.pics:ragtag/rag-tui/
          rm -f /tmp/deploy_key

